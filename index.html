<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitFlux — AIコーディネート試着室</title>
    <meta
      name="description"
      content="帽子・アイウェア・アウター・トップス・パンツ・靴を選ぶだけで、AIがそのコーディネートを着用した全身写真を生成します。"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .gradient-bg {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      .spinner {
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-left-color: #ffffff;
        border-radius: 50%;
        width: 48px;
        height: 48px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <div class="min-h-screen flex flex-col">
      <header class="gradient-bg text-white py-8 px-4">
        <div class="max-w-md mx-auto text-center">
          <h1 class="text-3xl font-bold tracking-tight">FitFlux</h1>
          <p class="mt-2 text-white/90 text-sm">
            選んだアイテムを AI が着用した全身写真を生成
          </p>
        </div>
      </header>

      <main class="flex-1 px-4 py-6">
        <div class="max-w-md mx-auto space-y-6">
          <!-- Input Form -->
          <form id="fitflux-form" class="bg-white rounded-2xl shadow-sm p-6 space-y-5">
            <div class="space-y-4" id="form-fields">
              <!-- Fields are generated by JS -->
            </div>

            <button
              type="submit"
              class="w-full gradient-bg text-white font-semibold py-3.5 px-6 rounded-xl shadow-lg hover:shadow-xl hover:opacity-90 transition active:scale-[0.98]"
            >
              コーディネートを生成
            </button>
          </form>

          <!-- Result Section -->
          <div id="result-section" class="hidden bg-white rounded-2xl shadow-sm p-6 space-y-4">
            <h2 class="text-lg font-bold text-gray-800">生成結果</h2>
            <div class="rounded-xl overflow-hidden bg-gray-100">
              <img
                id="result-image"
                src=""
                alt="生成されたコーディネート"
                class="w-full h-auto object-cover"
              />
            </div>
            <div class="text-xs text-gray-500 bg-gray-50 rounded-lg p-3">
              <p class="font-semibold mb-1">プロンプト:</p>
              <p id="result-prompt"></p>
            </div>
            <button
              id="retry-button"
              type="button"
              class="w-full bg-gray-900 text-white font-semibold py-3.5 px-6 rounded-xl hover:bg-gray-800 transition active:scale-[0.98]"
            >
              もう一度作る
            </button>
          </div>
        </div>
      </main>

      <footer class="px-4 py-6 text-center text-xs text-gray-500">
        <p class="max-w-md mx-auto">
          本サービスで生成された画像は AI（FLUX.1-dev / FLUX.1-schnell）による生成物です。
          画像の権利関係は各モデルのライセンスに従います。個人利用に限り自由に使用可能ですが、商用利用の可否は各モデルのライセンス条項をご確認ください。
        </p>
      </footer>
    </div>

    <!-- Loading Overlay -->
    <div
      id="loading-overlay"
      class="fixed inset-0 gradient-bg/95 backdrop-blur-sm z-50 hidden flex-col items-center justify-center text-white px-4"
    >
      <div class="spinner mb-6"></div>
      <p class="text-lg font-semibold">コーディネートを提案中…</p>
      <p class="mt-2 text-sm text-white/80">20〜40秒ほどかかることがあります</p>
      <button
        id="cancel-button"
        type="button"
        class="mt-8 text-sm underline underline-offset-4 text-white/80 hover:text-white"
      >
        キャンセル
      </button>
    </div>

    <!-- Error Toast -->
    <div
      id="error-toast"
      class="fixed top-4 left-4 right-4 max-w-md mx-auto bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-xl shadow-lg transform -translate-y-full opacity-0 transition-all duration-300 z-50"
      role="alert"
    >
      <p id="error-message"></p>
    </div>

    <script>
      const CATEGORIES = [
        { key: 'hat', label: '🧢 帽子', placeholder: 'cap', value: 'cap' },
        { key: 'eyewear', label: '🕶 アイウェア', placeholder: 'sunglasses', value: 'sunglasses' },
        { key: 'outer', label: '🧥 アウター', placeholder: 'MA-1 jacket', value: 'MA-1 jacket' },
        { key: 'tops', label: '👕 トップス', placeholder: 'T-shirt', value: 'T-shirt' },
        { key: 'pants', label: '👖 パンツ', placeholder: 'denim', value: 'denim' },
        { key: 'shoes', label: '👞 靴', placeholder: 'sneakers', value: 'sneakers' },
      ];

      const DEFAULT_COLORS = {
        hat: 'black',
        eyewear: 'black',
        outer: 'black',
        tops: 'white',
        pants: 'blue',
        shoes: 'white',
      };

      const COLORS = [
        { value: 'white', label: '白' },
        { value: 'gray', label: 'グレー' },
        { value: 'black', label: '黒' },
        { value: 'red', label: '赤' },
        { value: 'brown', label: '茶' },
        { value: 'yellow', label: '黄' },
        { value: 'green', label: '緑' },
        { value: 'blue', label: '青' },
        { value: 'purple', label: '紫' },
      ];

      const formFields = document.getElementById('form-fields');
      const form = document.getElementById('fitflux-form');
      const resultSection = document.getElementById('result-section');
      const resultImage = document.getElementById('result-image');
      const resultPrompt = document.getElementById('result-prompt');
      const retryButton = document.getElementById('retry-button');
      const loadingOverlay = document.getElementById('loading-overlay');
      const cancelButton = document.getElementById('cancel-button');
      const errorToast = document.getElementById('error-toast');
      const errorMessage = document.getElementById('error-message');

      let abortController = null;

      function renderFields() {
        formFields.innerHTML = CATEGORIES.map((cat) => {
          const colorOptions = COLORS.map(
            (c) => ` <option value="${c.value}"${DEFAULT_COLORS[cat.key] === c.value ? ' selected' : ''}>${c.label}</option>`
          ).join('');
          return `
            <div class="space-y-2">
              <label for="${cat.key}" class="block text-sm font-semibold text-gray-700">${cat.label}</label>
              <div class="flex gap-3">
                <input
                  type="text"
                  id="${cat.key}"
                  name="${cat.key}"
                  required
                  value="${cat.value}"
                  placeholder="${cat.placeholder}"
                  class="flex-1 min-w-0 rounded-xl border border-gray-300 px-4 py-2.5 text-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none"
                />
                <select
                  id="${cat.key}_color"
                  name="${cat.key}_color"
                  required
                  class="w-28 rounded-xl border border-gray-300 px-3 py-2.5 text-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none bg-white"
                >
                  ${colorOptions}
                </select>
              </div>
            </div>
          `;
        }).join('');
      }

      function showLoading(show) {
        if (show) {
          loadingOverlay.classList.remove('hidden');
          loadingOverlay.classList.add('flex');
        } else {
          loadingOverlay.classList.add('hidden');
          loadingOverlay.classList.remove('flex');
        }
      }

      function showError(message) {
        errorMessage.textContent = message;
        errorToast.classList.remove('-translate-y-full', 'opacity-0');
        setTimeout(() => {
          errorToast.classList.add('-translate-y-full', 'opacity-0');
        }, 5000);
      }

      async function handleSubmit(event) {
        event.preventDefault();

        const formData = new FormData(form);
        const body = {};
        for (const cat of CATEGORIES) {
          body[cat.key] = String(formData.get(cat.key) || '').trim();
          body[`${cat.key}_color`] = String(formData.get(`${cat.key}_color`) || '').trim();
        }

        showLoading(true);
        resultSection.classList.add('hidden');

        abortController = new AbortController();

        try {
          const response = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
            signal: abortController.signal,
          });

          const data = await response.json().catch(() => ({}));

          if (!response.ok) {
            throw new Error(data.error || '画像の生成に失敗しました。');
          }

          resultImage.src = data.image_url;
          resultPrompt.textContent = data.prompt || '';
          resultSection.classList.remove('hidden');
          resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } catch (err) {
          if (err.name === 'AbortError') {
            return;
          }
          console.error('Generate error:', err);
          showError(err.message || '画像の生成に失敗しました。もう一度お試しください。');
        } finally {
          showLoading(false);
          abortController = null;
        }
      }

      form.addEventListener('submit', handleSubmit);

      retryButton.addEventListener('click', () => {
        resultSection.classList.add('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      cancelButton.addEventListener('click', () => {
        if (abortController) {
          abortController.abort();
        }
        showLoading(false);
      });

      renderFields();
    </script>
  </body>
</html>
